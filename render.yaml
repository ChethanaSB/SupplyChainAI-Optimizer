services:
  # 1. FastAPI Backend Service (Docker)
  - type: web
    name: zf-logistics-backend
    env: docker
    dockerfilePath: ./backend/Dockerfile
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      # Tell FastAPI it's running in production mode
      - key: ENVIRONMENT
        value: production

  # 2. Next.js Frontend Service (Docker)
  - type: web
    name: zf-logistics-frontend
    env: docker
    dockerfilePath: ./frontend/Dockerfile
    envVars:
      - key: NODE_VERSION
        value: ~20
      # Dynamically inject the backend's URL into the frontend build
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: zf-logistics-backend
          envVarKey: RENDER_EXTERNAL_URL
